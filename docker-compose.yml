# Optional local orchestration — services still run dev servers unless you wire images.
version: "3.9"
services:
  api:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - .:/app
    command: bash -lc "pip install -r requirements.txt && PYTHONPATH=. python -m uvicorn apps.backend.app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      APP_MODE: mock
      DATABASE_URL: sqlite+aiosqlite:///./data/streamvault.db
  web:
    image: node:20-alpine
    working_dir: /app/apps/frontend
    volumes:
      - .:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    depends_on:
      - api
